name: Up Beameye Service
run-name: ${{ github.actor }} is deploying Beameye Service
on:
  push:
    branches: [ main, dev, ci ]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: test
      run: |
        make test
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.1
  build:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci'
    needs: [ test, lint ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [ "auth_micro", "profiles_micro", "query_micro", "users_micro", "postgre", "beameye" ]
    steps:
    - uses: actions/checkout@v4

    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: build and push ${{ matrix.image }}
      run: |
        docker build -t forus809/${{ matrix.image }}:latest -f ./backend/${{ matrix.image }}/Dockerfile .
        docker push forus809/${{ matrix.image }}:latest
